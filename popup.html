<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Privacy Blur</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1>WhatsApp Privacy</h1>
      <label><input type="checkbox" id="blurChatList"> Blur chat list</label>
      <label><input type="checkbox" id="blurChatDetail"> Blur chat detail</label>
      <label><input type="checkbox" id="blurNames"> Blur contact names</label>
      <p class="hint">Changes apply instantly on WhatsApp Web tabs.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
